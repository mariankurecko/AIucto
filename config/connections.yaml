connections:
  - id: personal-google-primary
    name: Personal Google Account
    account_id: personal
    provider: google
    identity: kurecko@gmail.com
    enabled: false
    status: oauth_not_configured
    capabilities:
      - gmail_read
      - gmail_draft
      - drive
      - docs
      - sheets
      - calendar
      - contacts
  - id: equisix-google-primary
    name: Equisix Primary Google Account
    account_id: equisix
    provider: google
    identity: hello@equisix.com
    enabled: true
    status: connected_readonly
    capabilities:
      - gmail_read
      - gmail_draft
      - drive
      - docs
      - sheets
      - calendar
      - contacts
  - id: kurecko-google-primary
    name: Kurecko Primary Google Account
    account_id: kurecko
    provider: google
    identity: kurecko@gmail.com
    enabled: true
    status: needs_auth
    capabilities:
      - gmail_read
      - gmail_draft
      - drive
      - docs
      - sheets
      - calendar
      - contacts
  - id: runtime-google-primary
    name: 85runtime Primary Google Account
    account_id: 85runtime
    provider: google
    identity: info@85runtime.sk
    enabled: false
    status: oauth_not_configured
    capabilities:
      - gmail_read
      - gmail_draft
      - drive
      - docs
      - sheets
      - calendar
      - contacts
domain_routing:
  - domain: equisix.com
    account_id: equisix
  - domain: 85runtime.sk
    account_id: 85runtime
explicit_identity_routing:
  - identity: kurecko@gmail.com
    account_id: kurecko
